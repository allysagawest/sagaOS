# Saga default Hyprland theme (neutral baseline)

general {
  border_size = 1
  col.active_border = rgb(4a90e2)
  col.inactive_border = rgb(7f8c9a)
}

decoration {
  rounding = 0

  blur {
    enabled = false
  }

  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  animation = windows,1,4,default
  animation = fade,1,4,default
  animation = workspaces,1,4,default
}
