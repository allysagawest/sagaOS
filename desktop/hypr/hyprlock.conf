background {
    monitor =
    color = rgba(10, 10, 18, 0.92)
}

label {
    monitor =
    text = $USER
    color = rgba(200, 200, 220, 1.0)
    font_size = 20
    font_family = Sans
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(230, 230, 255, 1.0)
    font_size = 72
    font_family = Sans
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(157, 78, 221, 0.95)
    inner_color = rgba(20, 20, 40, 0.85)
    font_color = rgba(240, 240, 255, 1.0)
    fade_on_empty = false
    check_color = rgba(0, 234, 255, 0.95)
    fail_color = rgba(255, 43, 214, 0.95)
    placeholder_text = "Password..."
    fail_text = "Authentication failed"
    position = 0, -80
    halign = center
    valign = center
}
